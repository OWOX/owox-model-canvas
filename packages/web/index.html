<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>OWOX Model Canvas — design data models, free</title>

    <!-- SEO + social card. Shared model links render this preview. -->
    <meta name="description" content="A free, anonymous canvas to design data models — draw marts and joinable relationships, explore templates, and export OKF. No sign-in needed." />
    <link rel="canonical" href="https://model.owox.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OWOX Model Canvas" />
    <meta property="og:url" content="https://model.owox.com/" />
    <meta property="og:title" content="OWOX Model Canvas — design data models, free" />
    <meta property="og:description" content="Draw your data model on a free, anonymous canvas — marts, joins, templates, OKF export. No sign-in needed." />
    <meta property="og:image" content="https://model.owox.com/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OWOX Model Canvas — design data models, free" />
    <meta name="twitter:description" content="Draw your data model on a free, anonymous canvas — marts, joins, templates, OKF export." />
    <meta name="twitter:image" content="https://model.owox.com/og-card.png" />

    <!-- Structured data (JSON-LD) for search + AI engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "OWOX Model Canvas",
      "url": "https://model.owox.com/",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any (web browser)",
      "description": "A free, anonymous canvas to design data models — draw data marts and joinable relationships, explore templates, and export to Open Knowledge Format (OKF). No sign-in needed.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "OWOX", "url": "https://www.owox.com/" }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is OWOX Model Canvas free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. The whole canvas is free and works without signing in. An OWOX API key is only needed to push your model into OWOX Data Marts." }
        },
        {
          "@type": "Question",
          "name": "Do I need an account to use it?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. You can design models, use templates, get AI question suggestions, and share a link anonymously. Only pushing into OWOX requires an API key." }
        },
        {
          "@type": "Question",
          "name": "What is OKF (Open Knowledge Format)?",
          "acceptedAnswer": { "@type": "Answer", "text": "A vendor-neutral markdown format for data models. OWOX Model Canvas can import and export OKF bundles so your model is portable." }
        },
        {
          "@type": "Question",
          "name": "Can I share a data model?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. The Share button copies a link that reopens your exact model — layout included — for anyone who opens it, no sign-in required." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
